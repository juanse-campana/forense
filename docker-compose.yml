services:
  postgres:
    image: postgres:16
    container_name: forense-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: forense
      POSTGRES_USER: forense
      POSTGRES_PASSWORD: forense
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forense -d forense"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
